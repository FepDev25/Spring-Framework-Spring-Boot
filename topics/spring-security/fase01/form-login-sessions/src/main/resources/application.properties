spring.application.name=form-login-sessions

# Duracion maxima de la sesion HTTP en segundos. -1 = sin limite.
server.servlet.session.timeout=30m

# Configura la cookie de sesion como HttpOnly (por defecto true).
# HttpOnly impide que JavaScript del cliente pueda leer la cookie,
server.servlet.session.cookie.http-only=true

# En produccion esto debe ser true para que la cookie solo viaje por HTTPS.
server.servlet.session.cookie.secure=false
