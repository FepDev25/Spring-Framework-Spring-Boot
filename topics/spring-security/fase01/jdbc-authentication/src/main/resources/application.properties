spring.application.name=jdbc-authentication

# Base de datos H2 embebida
# DB_CLOSE_DELAY=-1: mantiene la base de datos activa mientras la JVM este corriendo.
# DB_CLOSE_ON_EXIT=FALSE: no cierra la BD al salir de la JVM (redundante con -1, pero explicito).
spring.datasource.url=jdbc:h2:mem:securitydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola web de H2
# Accesible en http://localhost:8080/h2-console
# JDBC URL para conectarse desde la consola: jdbc:h2:mem:securitydb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Inicializacion SQL
# Spring Boot ejecuta schema.sql automaticamente para bases de datos embebidas.
spring.sql.init.mode=always

# Sesion
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
